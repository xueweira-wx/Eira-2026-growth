  === 部署指南 ===

  方法一：本地使用（直接双击打开）
  - 直接双击 index.html 即可使用大部分功能
  - SQL练习和浏览器通知需要HTTP服务器
  - 启动本地服务器: python3 -m http.server 8080
  - 然后打开 http://localhost:8080

  方法二：部署到 GitHub Pages（免费，可分享）
  1. 注册 GitHub 账号 (github.com)
  2. 创建新仓库（Repository）
  3. 上传 2026-growth 文件夹中的所有文件
  4. 进入仓库 Settings → Pages
  5. Source 选择 "main" 分支，点击 Save
  6. 等待几分钟，你的网页就可以通过 https://你的用户名.github.io/仓库名 访问了！

  方法三：部署到 Vercel（免费，更快）
  1. 注册 Vercel 账号 (vercel.com)
  2. 连接你的 GitHub 仓库
